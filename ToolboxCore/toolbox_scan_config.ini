#!/usr/bin/env ini
#MN toolbox_scan_config
#MD Toolbox scan include/exclude configuration
#MDD Defines TopLevel menu scripts, always excluded directories, ignore patterns, and always included directories for the ToolBox Ninja dynamic menu system.
#MI ToolboxCore
#INFO https://github.com/ToolboxMenu
#MC default
#MP top
#MIICON gear
#MTAGS config,menu,scan,toolbox
#MAUTHOR Alistair Henderson

; ================================================
; Toolbox Scan Configuration
; ================================================
; This configuration file controls which scripts and directories are
; included or excluded in the ToolBox Ninja menu scanning system.
;
; Sections:
; - [TopLevel]: Scripts forced to be top-level menu entries regardless of other rules
; - [AlwaysExclude]: Directories always excluded from scanning
; - [IgnorePatterns]: File patterns to ignore globally
; - [AlwaysInclude]: Directories always included even if excluded elsewhere
;
; Notes:
; - TopLevel entries OVERRIDE any exclusion rules.
; - Order of TopLevel defines order of these menu entries in the final menu.
; - Nested menus are created based on directory structure for included scripts.
; ================================================

[TopLevel]
; Scripts listed here will always appear in the menu as top-level items
; regardless of exclusion rules, in the order listed below.
ToolboxSetup/create_script_skeleton.sh
ToolboxPages/init_pages.sh
ToolboxPages/update_pages.sh
ToolboxPages/generate_readme.sh

; The above will create a menu structure like:
; 1. ToolboxSetup
;    1.1 create_script_skeleton.sh
; 2. ToolboxPages
;    2.1 init_pages.sh
;    2.2 update_pages.sh
;    2.3 generate_readme.sh

[AlwaysExclude]
; Directories listed here are excluded from scanning unless specifically included in [AlwaysInclude]
ToolboxCore
docs
ToolboxSetup
ToolboxPages
toolbox
.
.git
.github
testmenu


[IgnorePatterns]
; File patterns to ignore globally
*.md
README.*
LICENSE.*
install_toolbox_ninja.sh
toolbox_rebuild.sh
*.ymli
install_toolbox_foundations.sh

[AlwaysInclude]
; Directories listed here are always included, overriding [AlwaysExclude] if there is a conflict
LinuxTools
ToolboxTools

